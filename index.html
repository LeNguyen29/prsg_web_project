<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/index_style.css">
    <link rel="stylesheet" href="css/navbar_style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>PRSG Home</title>
    <link rel="icon" type="image/x-icon" href="assets/FS_Logo.ico">
</head>

<body class="background-tint">
    <header>
        <div id="navbar"></div>
    </header>

    <main>
        <section id="game_description">
            <p>DELIVERING PREMIUM POWER RANGERS EXPERIENCE ON ROBLOX</p>
        </section>

        <div class="white_divider"></div>
        
        <button id="play_btn" type="button" class="btn btn-primary">
            Play Now <i class="fa-solid fa-play"></i>
        </button>

        <div id="studio_name">
            <img id="studio_logo" src="assets/Fragmented_Studio_Logo.png">
        </div>
    </main>

    <footer></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/94c96a59cb.js" crossorigin="anonymous"></script>
</body>
</html>

<script>
    fetch("navbar.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("navbar").innerHTML = data;
        });
</script>
